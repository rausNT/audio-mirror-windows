name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build release assets
        shell: pwsh
        run: .\tools\Build-Installer.ps1

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          $notes = @"
          AudioMirror $version

          Assets:
          - AudioMirrorSetup-win-x64.zip: installer package.
          - AudioMirrorApp-win-x64.zip: portable app package.
          "@

          gh release create $tag `
            .\AudioMirrorSetup-win-x64.zip `
            .\AudioMirrorApp-win-x64.zip `
            --title "AudioMirror $version" `
            --notes $notes `
            --verify-tag
