name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build release assets
        shell: pwsh
        run: .\tools\Build-Installer.ps1

      - name: Upload app zip
        uses: actions/upload-artifact@v4
        with:
          name: AudioMirrorApp-win-x64
          path: AudioMirrorApp-win-x64.zip

      - name: Upload setup zip
        uses: actions/upload-artifact@v4
        with:
          name: AudioMirrorSetup-win-x64
          path: AudioMirrorSetup-win-x64.zip
